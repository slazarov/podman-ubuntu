name: podman-skopeo
arch: "${ARCH}"
platform: linux
version: "${VERSION}"
version_schema: none
maintainer: "Podman Debian <noreply@github.com>"
description: "Container image utility for copying and inspecting images (compiled from source)"
vendor: "podman-debian"
homepage: "https://github.com/containers/skopeo"
license: "Apache-2.0"
section: admin
priority: optional

depends:
  - podman-container-configs

conflicts:
  - skopeo

replaces:
  - skopeo

provides:
  - skopeo

contents:
  - src: "${DESTDIR}/usr/bin/skopeo"
    dst: /usr/bin/skopeo
    file_info:
      mode: 0755
  # Man pages (skopeo-specific only; glob avoids pulling in other components' pages)
  - src: "${DESTDIR}/usr/share/man/man1/skopeo*"
    dst: /usr/share/man/man1/
  # Shell completions (skopeo-specific)
  - src: "${DESTDIR}/usr/share/bash-completion/completions/skopeo*"
    dst: /usr/share/bash-completion/completions/
