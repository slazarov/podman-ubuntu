name: podman-podman
arch: "${ARCH}"
platform: linux
version: "${VERSION}"
version_schema: none
maintainer: "Podman Debian <noreply@github.com>"
description: "Container engine for OCI containers (compiled from source)"
vendor: "podman-debian"
homepage: "https://github.com/containers/podman"
license: "Apache-2.0"
section: admin
priority: optional

depends:
  - podman-crun
  - podman-conmon
  - podman-netavark
  - podman-aardvark-dns
  - podman-pasta
  - podman-fuse-overlayfs
  - podman-catatonit
  - podman-container-configs

conflicts:
  - podman

replaces:
  - podman

provides:
  - podman

contents:
  - src: "${DESTDIR}/usr/bin/podman"
    dst: /usr/bin/podman
    file_info:
      mode: 0755
  - src: "${DESTDIR}/usr/bin/podman-remote"
    dst: /usr/bin/podman-remote
    file_info:
      mode: 0755
  - src: "${DESTDIR}/usr/libexec/podman/quadlet"
    dst: /usr/libexec/podman/quadlet
    file_info:
      mode: 0755
  - src: "${DESTDIR}/usr/libexec/podman/rootlessport"
    dst: /usr/libexec/podman/rootlessport
    file_info:
      mode: 0755
  - src: "${DESTDIR}/usr/share/man/man1/"
    dst: /usr/share/man/man1/
    type: tree
  - src: "${DESTDIR}/usr/lib/systemd/"
    dst: /usr/lib/systemd/
    type: tree
  - src: "${DESTDIR}/usr/share/bash-completion/"
    dst: /usr/share/bash-completion/
    type: tree
  - src: "${DESTDIR}/usr/share/fish/"
    dst: /usr/share/fish/
    type: tree
  - src: "${DESTDIR}/usr/share/zsh/"
    dst: /usr/share/zsh/
    type: tree
