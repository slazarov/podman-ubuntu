name: podman-podman
arch: "${ARCH}"
platform: linux
version: "${VERSION}"
version_schema: none
maintainer: "Podman Ubuntu <noreply@github.com>"
description: "Container engine for OCI containers (compiled from source)"
vendor: "podman-ubuntu"
homepage: "https://github.com/containers/podman"
license: "Apache-2.0"
section: admin
priority: optional

depends:
  # Internal suite packages
  - podman-crun
  - podman-conmon
  - podman-netavark
  - podman-aardvark-dns
  - podman-pasta
  - podman-fuse-overlayfs
  - podman-catatonit
  - podman-container-configs
  # System libraries; runtime deps verified via ldd /usr/bin/podman.
  - libgpgme11
  - libseccomp2

conflicts:
  - podman

replaces:
  - podman

provides:
  - podman

contents:
  - src: "${DESTDIR}/usr/bin/podman"
    dst: /usr/bin/podman
    file_info:
      mode: 0755
  - src: "${DESTDIR}/usr/bin/podman-remote"
    dst: /usr/bin/podman-remote
    file_info:
      mode: 0755
  - src: "${DESTDIR}/usr/libexec/podman/quadlet"
    dst: /usr/libexec/podman/quadlet
    file_info:
      mode: 0755
  - src: "${DESTDIR}/usr/libexec/podman/rootlessport"
    dst: /usr/libexec/podman/rootlessport
    file_info:
      mode: 0755
  # Man pages (podman-specific only; glob avoids pulling in other components' pages)
  - src: "${DESTDIR}/usr/share/man/man1/podman*"
    dst: /usr/share/man/man1/
  # Man section 7 (podman-rootless, podman-troubleshooting)
  - src: "${DESTDIR}/usr/share/man/man7/"
    dst: /usr/share/man/man7/
    type: tree
  - src: "${DESTDIR}/usr/lib/systemd/"
    dst: /usr/lib/systemd/
    type: tree
  # Shell completions (podman-specific; glob avoids pulling in other components')
  - src: "${DESTDIR}/usr/share/bash-completion/completions/podman*"
    dst: /usr/share/bash-completion/completions/
  - src: "${DESTDIR}/usr/share/fish/vendor_completions.d/podman*"
    dst: /usr/share/fish/vendor_completions.d/
  - src: "${DESTDIR}/usr/share/zsh/site-functions/_podman*"
    dst: /usr/share/zsh/site-functions/
