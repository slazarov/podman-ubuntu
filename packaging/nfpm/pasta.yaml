name: podman-pasta
arch: "${ARCH}"
platform: linux
version: "${VERSION}"
version_schema: none
maintainer: "Podman Ubuntu <noreply@github.com>"
description: "User-mode networking for rootless containers (compiled from source)"
vendor: "podman-ubuntu"
homepage: "https://passt.top/"
license: "GPL-2.0-or-later"
section: admin
priority: optional

# System-library depends are injected at build time (WR-02). The injected
# fragment carries its own `depends:` header so a fully-static binary (empty
# detected set) produces no depends: key at all rather than an empty one.
${DETECTED_DEPENDS}

conflicts:
  - passt

replaces:
  - passt

provides:
  - passt

contents:
  - src: "${DESTDIR}/usr/bin/passt"
    dst: /usr/bin/passt
    file_info:
      mode: 0755
  - src: "${DESTDIR}/usr/bin/pasta"
    dst: /usr/bin/pasta
    file_info:
      mode: 0755
