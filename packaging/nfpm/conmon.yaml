name: podman-conmon
arch: "${ARCH}"
platform: linux
version: "${VERSION}"
version_schema: none
maintainer: "Podman Ubuntu <noreply@github.com>"
description: "OCI container runtime monitor (compiled from source)"
vendor: "podman-ubuntu"
homepage: "https://github.com/containers/conmon"
license: "Apache-2.0"
section: admin
priority: optional

depends:
  # System libraries detected from the binary and injected at build time.
${DETECTED_DEPENDS}

conflicts:
  - conmon

replaces:
  - conmon

provides:
  - conmon

contents:
  - src: "${DESTDIR}/usr/bin/conmon"
    dst: /usr/bin/conmon
    file_info:
      mode: 0755
