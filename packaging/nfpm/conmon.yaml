name: podman-conmon
arch: "${ARCH}"
platform: linux
version: "${VERSION}"
version_schema: none
maintainer: "Podman Debian <noreply@github.com>"
description: "OCI container runtime monitor (compiled from source)"
vendor: "podman-debian"
homepage: "https://github.com/containers/conmon"
license: "Apache-2.0"
section: admin
priority: optional

depends:
  # conmon is a C binary; runtime deps verified via ldd /usr/bin/conmon.
  - libglib2.0-0
  - libsystemd0

conflicts:
  - conmon

replaces:
  - conmon

provides:
  - conmon

contents:
  - src: "${DESTDIR}/usr/bin/conmon"
    dst: /usr/bin/conmon
    file_info:
      mode: 0755
