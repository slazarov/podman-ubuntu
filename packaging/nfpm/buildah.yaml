name: podman-buildah
arch: "${ARCH}"
platform: linux
version: "${VERSION}"
version_schema: none
maintainer: "Podman Debian <noreply@github.com>"
description: "OCI image builder (compiled from source)"
vendor: "podman-debian"
homepage: "https://github.com/containers/buildah"
license: "Apache-2.0"
section: admin
priority: optional

depends:
  - podman-container-configs

conflicts:
  - buildah

replaces:
  - buildah

provides:
  - buildah

contents:
  - src: "${DESTDIR}/usr/bin/buildah"
    dst: /usr/bin/buildah
    file_info:
      mode: 0755
  - src: "${DESTDIR}/usr/share/man/man1/"
    dst: /usr/share/man/man1/
    type: tree
  - src: "${DESTDIR}/usr/share/bash-completion/"
    dst: /usr/share/bash-completion/
    type: tree
