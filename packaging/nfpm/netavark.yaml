name: podman-netavark
arch: "${ARCH}"
platform: linux
version: "${VERSION}"
version_schema: none
maintainer: "Podman Ubuntu <noreply@github.com>"
description: "Container network stack for Podman (compiled from source)"
vendor: "podman-ubuntu"
homepage: "https://github.com/containers/netavark"
license: "Apache-2.0"
section: admin
priority: optional

depends:
  - podman-container-configs

conflicts:
  - netavark

replaces:
  - netavark

provides:
  - netavark

contents:
  - src: "${DESTDIR}/usr/bin/netavark"
    dst: /usr/bin/netavark
    file_info:
      mode: 0755
  - src: "${DESTDIR}/usr/bin/netavark-dhcp-proxy-client"
    dst: /usr/bin/netavark-dhcp-proxy-client
    file_info:
      mode: 0755
