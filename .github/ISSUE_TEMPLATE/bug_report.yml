name: Bug report
description: A package that won't install/run, or a build/CI/repo failure
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. For **security issues**, use private reporting
        instead — see SECURITY.md.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Installing packages from the APT repo
        - Building from source (setup.sh / build_*.sh)
        - Packaging (.deb / nFPM)
        - CI / publish
        - Other
    validations:
      required: true
  - type: input
    id: distro
    attributes:
      label: Ubuntu version
      placeholder: "24.04 or 26.04"
    validations:
      required: true
  - type: dropdown
    id: arch
    attributes:
      label: Architecture
      options: [amd64, arm64]
    validations:
      required: true
  - type: dropdown
    id: track
    attributes:
      label: Track / suite
      options: [stable, edge, nightly, "n/a (building from source)"]
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: Package/component version
      placeholder: "e.g. podman-podman 6.0.0~ubuntu24.04.podman1"
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What you did, what you expected, what actually happened.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: apt errors, build log tail, `podman info`, etc.
      render: shell
