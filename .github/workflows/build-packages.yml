name: Build and Publish Packages

on:
  schedule:
    - cron: '30 4 * * *'  # 4:30 AM UTC daily — nightly builds
  workflow_dispatch:
    inputs:
      build_track:
        description: 'Build track (stable = pinned versions, edge = latest upstream tags, nightly = latest upstream commits)'
        required: true
        type: choice
        options:
          - stable
          - edge
          - nightly
        default: stable

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ============================================
  # Check if upstream components changed (cron only)
  # ============================================
  check-changes:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-24.04
    outputs:
      skip: ${{ steps.detect.outputs.skip }}
    steps:
      - name: Restore last-known SHAs
        uses: actions/cache@v4
        with:
          path: /tmp/nightly-sha.json
          key: nightly-sha-v1

      - name: Detect upstream changes
        id: detect
        run: |
          SHA_FILE="/tmp/nightly-sha.json"
          OLD_SHAS=$(cat "$SHA_FILE" 2>/dev/null || echo "{}")

          declare -A REPOS
          REPOS[podman]="https://github.com/containers/podman.git"
          REPOS[buildah]="https://github.com/containers/buildah.git"
          REPOS[crun]="https://github.com/containers/crun.git"
          REPOS[conmon]="https://github.com/containers/conmon"
          REPOS[netavark]="https://github.com/containers/netavark"
          REPOS[aardvark-dns]="https://github.com/containers/aardvark-dns"
          REPOS[skopeo]="https://github.com/containers/skopeo.git"
          REPOS[fuse-overlayfs]="https://github.com/containers/fuse-overlayfs.git"
          REPOS[catatonit]="https://github.com/openSUSE/catatonit.git"
          REPOS[container-libs]="https://github.com/containers/container-libs.git"
          REPOS[pasta]="https://passt.top/passt"
          REPOS[go-md2man]="https://github.com/cpuguy83/go-md2man.git"
          REPOS[toolbox]="https://github.com/containers/toolbox.git"

          CHANGED=""
          NEW_SHAS="{"
          FIRST=true

          for comp in "${!REPOS[@]}"; do
            HEAD_SHA=$(git ls-remote "${REPOS[$comp]}" HEAD 2>/dev/null | awk '{print $1}' | head -1 || echo "unknown")
            OLD_SHA=$(echo "$OLD_SHAS" | grep -o "\"${comp}\":\"[^\"]*\"" | head -1 | sed 's/.*:"//;s/".*//')

            if [[ -z "$OLD_SHA" || "$HEAD_SHA" != "$OLD_SHA" ]]; then
              CHANGED="${CHANGED}  ${comp}: ${OLD_SHA:-<new>} -> ${HEAD_SHA}\n"
            fi

            [[ "$FIRST" == true ]] && FIRST=false || NEW_SHAS+=","
            NEW_SHAS+="\"${comp}\":\"${HEAD_SHA}\""
          done

          NEW_SHAS+="}"
          echo "$NEW_SHAS" > "$SHA_FILE"

          if [[ -n "$CHANGED" ]]; then
            echo -e "Changes detected:\n$CHANGED"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "No upstream changes detected. Skipping build."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

  # ============================================
  # Build all distro x arch cells in one matrix
  # ============================================
  # CICD-05: one strategy.matrix fans out to all four cells in a single run.
  # fail-fast: false — a 26.04 cell failure must NOT abort the 24.04 cells.
  # CICD-06: the runner label is a matrix FIELD (matrix.runner), not hardcoded
  #   in any step. When GA ubuntu-26.04 / ubuntu-26.04-arm runners land, switch
  #   a 26.04 cell off its container by editing that cell's `runner` (and
  #   blanking its `container`) — a one-line change per cell, no step edits.
  # CICD-07: Go cache keys and artifact names carry a distro dimension so a
  #   26.04 build can never reuse a 24.04 cache or land in a 24.04 artifact.
  build:
    needs: [check-changes]
    if: always() && (github.event_name == 'workflow_dispatch' || needs.check-changes.outputs.skip != 'true')
    runs-on: ${{ matrix.runner }}
    # Empty matrix.container => GitHub Actions runs directly on the runner host
    # (the 2404 cells). The 2604 cells run inside an ubuntu:26.04 container on
    # the same native amd64/arm64 host runners.
    container: ${{ matrix.container }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        # One include entry per cell pairs distro<->arch<->runner<->container
        # explicitly (no cartesian product + exclusions). To move a 26.04 cell
        # onto a future GA runner, change its `runner` and set `container: ''`.
        include:
          - distro: '2404'
            arch: amd64
            runner: ubuntu-24.04
            container: ''
          - distro: '2404'
            arch: arm64
            runner: ubuntu-24.04-arm
            container: ''
          - distro: '2604'
            arch: amd64
            runner: ubuntu-24.04
            container: ubuntu:26.04
          - distro: '2604'
            arch: arm64
            runner: ubuntu-24.04-arm
            container: ubuntu:26.04
    steps:
      # 2604 cells start from a bare ubuntu:26.04 container as root, which lacks
      # the tooling the host runner images already ship (sudo + a sudo-capable
      # user, git, curl, ca-certificates). The 2404 cells skip this — their host
      # runner already provides these. setup.sh/install_dependencies.sh install
      # the actual build deps; this only bootstraps enough to reach setup.sh.
      - name: Bootstrap ubuntu:26.04 container prerequisites
        if: matrix.container != ''
        run: |
          apt-get update
          apt-get install -y --no-install-recommends sudo git curl ca-certificates

      - uses: actions/checkout@v4

      - name: Resolve build track
        id: track
        run: |
          TRACK="${{ inputs.build_track || 'nightly' }}"
          echo "track=${TRACK}" >> "$GITHUB_OUTPUT"
          echo "Build track: ${TRACK}"

      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-mod
            ~/.cache/go-build
          # CICD-07: distro + explicit matrix.arch in the key isolate caches per
          # distro AND arch (matrix.arch is authoritative regardless of how the
          # runner reports runner.arch), preventing cross-distro contamination.
          key: go-${{ matrix.distro }}-${{ matrix.arch }}-${{ steps.track.outputs.track }}-${{ github.run_number }}
          restore-keys: |
            go-${{ matrix.distro }}-${{ matrix.arch }}-${{ steps.track.outputs.track }}-
            go-${{ matrix.distro }}-${{ matrix.arch }}-

      - name: Update apt cache
        run: sudo apt-get update

      - name: Build all components
        run: |
          # Dotted DISTRO override (T-21-03): closed case map from the matrix
          # label to the dotted VERSION_ID detect_distro_version_id validates
          # against ^[0-9]+\.[0-9]+$. Anything outside the allowlist hard-fails.
          case "${{ matrix.distro }}" in
            2404) DISTRO_DOTTED=24.04 ;;
            2604) DISTRO_DOTTED=26.04 ;;
            *) echo "ERROR: unknown matrix.distro '${{ matrix.distro }}'" >&2; exit 1 ;;
          esac
          DESTDIR="${{ runner.temp }}/podman-staging"
          mkdir -p "$DESTDIR"
          # Ensure Go cache dirs exist and are writable by root
          mkdir -p "$HOME/.cache/go-build" "$HOME/.cache/go-mod"
          # Build env args for sudo env (bypasses env_reset completely)
          # Point Go caches to runner-accessible paths for actions/cache compatibility
          ENV_ARGS="DEBIAN_FRONTEND=noninteractive DESTDIR=$DESTDIR"
          ENV_ARGS="$ENV_ARGS GOCACHE=$HOME/.cache/go-build GOMODCACHE=$HOME/.cache/go-mod"
          # Thread the dotted DISTRO override into setup.sh so config.sh composes
          # VERSION_SUFFIX=~ubuntu${DISTRO_DOTTED}.podman1 for this cell.
          ENV_ARGS="$ENV_ARGS DISTRO=$DISTRO_DOTTED"
          if [[ "${{ steps.track.outputs.track }}" == "stable" ]]; then
            while IFS= read -r line; do
              [[ "$line" =~ ^[[:space:]]*# || -z "$line" ]] && continue
              line="${line#export }"
              key="${line%%=*}"
              val="${line#*=}"
              val="${val%\"}"
              val="${val#\"}"
              ENV_ARGS="$ENV_ARGS ${key}=${val}"
            done < versions-stable.env
          elif [[ "${{ steps.track.outputs.track }}" == "edge" ]]; then
            # Edge builds components from latest tags but needs pinned build tools
            eval "$(grep -E '^export (PROTOC_VERSION|PROTOC_TAG)=' versions-stable.env)"
            ENV_ARGS="$ENV_ARGS PROTOC_VERSION=$PROTOC_VERSION PROTOC_TAG=$PROTOC_TAG"
          elif [[ "${{ steps.track.outputs.track }}" == "nightly" ]]; then
            ENV_ARGS="$ENV_ARGS NIGHTLY_BUILD=true SHALLOW_CLONE=false"
          fi
          sudo env $ENV_ARGS ./setup.sh
          # Fix ownership so actions/cache can save the Go caches
          sudo chown -R "$(id -u):$(id -g)" "$HOME/.cache/go-build" "$HOME/.cache/go-mod"
        timeout-minutes: 150

      - name: Debug DESTDIR contents
        if: always()
        run: |
          DESTDIR="${{ runner.temp }}/podman-staging"
          echo "=== DESTDIR tree (directories) ==="
          find "$DESTDIR" -type d 2>/dev/null | head -50 || echo "DESTDIR not found or empty"
          echo ""
          echo "=== DESTDIR files (binaries) ==="
          find "$DESTDIR" -type f -name '*.so*' -o -type f -perm /111 2>/dev/null | head -50 || echo "No binaries found"
          echo ""
          echo "=== DESTDIR usr/bin/ ==="
          ls -la "$DESTDIR/usr/bin/" 2>/dev/null || echo "usr/bin/ does not exist"
          echo ""
          echo "=== DESTDIR total file count ==="
          find "$DESTDIR" -type f 2>/dev/null | wc -l

      - name: Install nFPM
        run: |
          # Use Go installed by setup.sh
          export PATH="/opt/go/$(ls /opt/go/)/bin:$HOME/go/bin:$PATH"
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.45.0

      - name: Package all components
        run: |
          # Same dotted DISTRO override so package_all.sh's config.sh source
          # composes the correct per-distro VERSION_SUFFIX and the .deb filenames
          # carry ~ubuntu${DISTRO_DOTTED}.podman1 for this cell.
          case "${{ matrix.distro }}" in
            2404) DISTRO_DOTTED=24.04 ;;
            2604) DISTRO_DOTTED=26.04 ;;
            *) echo "ERROR: unknown matrix.distro '${{ matrix.distro }}'" >&2; exit 1 ;;
          esac
          export DISTRO="$DISTRO_DOTTED"
          export PATH="/opt/go/$(ls /opt/go/)/bin:$HOME/go/bin:$PATH"
          export DESTDIR="${{ runner.temp }}/podman-staging"
          if [[ "${{ steps.track.outputs.track }}" == "nightly" ]]; then
            export NIGHTLY_BUILD=true
          fi
          ./scripts/package_all.sh

      - uses: actions/upload-artifact@v4
        with:
          # CICD-07: distro + arch in the artifact name — the four names are
          # debs-2404-amd64, debs-2404-arm64, debs-2604-amd64, debs-2604-arm64.
          name: debs-${{ matrix.distro }}-${{ matrix.arch }}
          path: output/*.deb
          retention-days: 30

  # ============================================
  # Publish APT repository to GitHub Pages
  # ============================================
  # Atomic 4-cell gating + per-distro download is retrofitted in Phase 21 Plan 02
  publish:
    needs: [build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve build track
        id: track
        run: |
          TRACK="${{ inputs.build_track || 'nightly' }}"
          echo "track=${TRACK}" >> "$GITHUB_OUTPUT"
          # Single distro for this phase (24.04 only). The Phase-21 build matrix
          # replaces this literal with a per-distro matrix var — a one-line change.
          echo "distro=2404" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          pattern: debs-*
          path: all-debs/
          merge-multiple: true

      - name: Install reprepro
        run: |
          sudo apt-get update
          sudo apt-get install -y reprepro

      - name: Build and publish repository
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          ./scripts/ci_publish.sh \
            "${{ steps.track.outputs.track }}" \
            "${{ steps.track.outputs.distro }}" \
            "all-debs" \
            "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}" \
            "repo-output"

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: repo-output/

      - id: deployment
        uses: actions/deploy-pages@v4
