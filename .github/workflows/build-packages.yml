name: Build and Publish Packages

on:
  schedule:
    - cron: '30 4 * * *'  # 4:30 AM UTC daily — nightly builds
  workflow_dispatch:
    inputs:
      build_track:
        description: 'Build track (stable = pinned versions, edge = latest upstream tags, nightly = latest upstream commits)'
        required: true
        type: choice
        options:
          - stable
          - edge
          - nightly
        default: stable

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ============================================
  # Check if upstream components changed (cron only)
  # ============================================
  check-changes:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-24.04
    outputs:
      skip: ${{ steps.detect.outputs.skip }}
    steps:
      - name: Restore last-known SHAs
        uses: actions/cache@v5
        with:
          path: /tmp/nightly-sha.json
          key: nightly-sha-v1-${{ github.run_number }}
          restore-keys: |
            nightly-sha-v1-

      - name: Detect upstream changes
        id: detect
        run: |
          SHA_FILE="/tmp/nightly-sha.json"
          OLD_SHAS=$(cat "$SHA_FILE" 2>/dev/null || echo "{}")

          declare -A REPOS
          REPOS[podman]="https://github.com/containers/podman.git"
          REPOS[buildah]="https://github.com/containers/buildah.git"
          REPOS[crun]="https://github.com/containers/crun.git"
          REPOS[conmon]="https://github.com/containers/conmon"
          REPOS[netavark]="https://github.com/containers/netavark"
          REPOS[aardvark-dns]="https://github.com/containers/aardvark-dns"
          REPOS[skopeo]="https://github.com/containers/skopeo.git"
          REPOS[fuse-overlayfs]="https://github.com/containers/fuse-overlayfs.git"
          REPOS[catatonit]="https://github.com/openSUSE/catatonit.git"
          REPOS[container-libs]="https://github.com/containers/container-libs.git"
          REPOS[pasta]="https://passt.top/passt"
          REPOS[go-md2man]="https://github.com/cpuguy83/go-md2man.git"
          REPOS[toolbox]="https://github.com/containers/toolbox.git"

          CHANGED=""
          NEW_SHAS="{"
          FIRST=true

          for comp in "${!REPOS[@]}"; do
            HEAD_SHA=$(git ls-remote "${REPOS[$comp]}" HEAD 2>/dev/null | awk '{print $1}' | head -1 || echo "unknown")
            OLD_SHA=$(echo "$OLD_SHAS" | grep -o "\"${comp}\":\"[^\"]*\"" | head -1 | sed 's/.*:"//;s/".*//')

            if [[ -z "$OLD_SHA" || "$HEAD_SHA" != "$OLD_SHA" ]]; then
              CHANGED="${CHANGED}  ${comp}: ${OLD_SHA:-<new>} -> ${HEAD_SHA}\n"
            fi

            [[ "$FIRST" == true ]] && FIRST=false || NEW_SHAS+=","
            NEW_SHAS+="\"${comp}\":\"${HEAD_SHA}\""
          done

          NEW_SHAS+="}"
          echo "$NEW_SHAS" > "$SHA_FILE"

          if [[ -n "$CHANGED" ]]; then
            echo -e "Changes detected:\n$CHANGED"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "No upstream changes detected. Skipping build."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

  # ============================================
  # Republish guard (manual stable/edge dispatch)
  # ============================================
  # A manual stable/edge dispatch otherwise rebuilds + republishes all four
  # cells unconditionally, even when nothing changed. This job short-circuits
  # the run when every tagged component is already published at the version this
  # dispatch would build (pasta is excluded — it floats by date on every track;
  # see scripts/check_republish_needed.sh). It is strictly conservative: any
  # fetch/resolution uncertainty yields skip=false, so it can only ever avoid a
  # redundant rebuild, never skip a needed one. Nightly is untouched —
  # check-changes already guards the scheduled run.
  check-republish:
    if: github.event_name == 'workflow_dispatch' && (inputs.build_track == 'stable' || inputs.build_track == 'edge')
    runs-on: ubuntu-24.04
    outputs:
      skip: ${{ steps.guard.outputs.skip }}
    steps:
      - uses: actions/checkout@v5
      - name: Compare resolved versions against the live repository
        id: guard
        run: |
          REPO_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          ./scripts/check_republish_needed.sh "${{ inputs.build_track }}" "${REPO_URL}"

  # ============================================
  # Build all distro x arch cells in one matrix
  # ============================================
  # CICD-05: one strategy.matrix fans out to all four cells in a single run.
  # fail-fast: false — a 26.04 cell failure must NOT abort the 24.04 cells.
  # CICD-06: the runner label is a matrix FIELD (matrix.runner), not hardcoded
  #   in any step. When GA ubuntu-26.04 / ubuntu-26.04-arm runners land, switch
  #   a 26.04 cell off its container by editing that cell's `runner` (and
  #   blanking its `container`) — a one-line change per cell, no step edits.
  # CICD-07: Go cache keys and artifact names carry a distro dimension so a
  #   26.04 build can never reuse a 24.04 cache or land in a 24.04 artifact.
  build:
    needs: [check-changes, check-republish]
    # Gate order: check-changes guards scheduled nightly; check-republish guards
    # manual stable/edge no-ops. A SKIPPED guard job yields an empty output, and
    # '' != 'true', so neither guard blocks a run it doesn't apply to.
    if: >-
      always()
      && (github.event_name == 'workflow_dispatch' || needs.check-changes.outputs.skip != 'true')
      && needs.check-republish.outputs.skip != 'true'
    runs-on: ${{ matrix.runner }}
    # Empty matrix.container => GitHub Actions runs directly on the runner host
    # (the 2404 cells). The 2604 cells run inside an ubuntu:26.04 container on
    # the same native amd64/arm64 host runners.
    container: ${{ matrix.container }}
    timeout-minutes: 180
    # Container jobs default run: steps to /bin/sh (bare ubuntu:26.04 has no
    # bash until bootstrap installs it), which breaks every [[ ]] in the build
    # steps. Force bash for the whole job; the two pre-bash bootstrap steps
    # below override back to sh explicitly.
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        # One include entry per cell pairs distro<->arch<->runner<->container
        # explicitly (no cartesian product + exclusions). To move a 26.04 cell
        # onto a future GA runner, change its `runner` and set `container: ''`.
        include:
          - distro: '2404'
            arch: amd64
            runner: ubuntu-24.04
            container: ''
          - distro: '2404'
            arch: arm64
            runner: ubuntu-24.04-arm
            container: ''
          - distro: '2604'
            arch: amd64
            runner: ubuntu-24.04
            container: ubuntu:26.04
          - distro: '2604'
            arch: arm64
            runner: ubuntu-24.04-arm
            container: ubuntu:26.04
    steps:
      # 2604 cells start from a bare ubuntu:26.04 container as root, which lacks
      # the tooling the host runner images already ship (sudo + a sudo-capable
      # user, git, curl, ca-certificates). The 2404 cells skip this — their host
      # runner already provides these. setup.sh/install_dependencies.sh install
      # the actual build deps; this only bootstraps enough to reach setup.sh.
      - name: Bootstrap ubuntu:26.04 container prerequisites
        if: matrix.container != ''
        # shell: sh — bash does not exist in the bare container until this step
        # installs it, so the job-level bash default would fail here.
        shell: sh
        run: |
          apt-get update
          apt-get install -y --no-install-recommends sudo git curl ca-certificates bash

      # NOTE on /dev/fuse in the 2604 container (debugged 2026-06-07): the GHA
      # job container is created WITHOUT --device /dev/fuse. mknod'ing the node
      # inside the container succeeds (Docker's default device cgroup allows
      # `c *:* m`) but read/write on 10:229 stays DENIED by the device cgroup —
      # the kernel consults it on every permission check of a device inode, even
      # for root. So setup.sh's VAL-03 ([[ -r /dev/fuse ]]) can never pass in
      # this container. Compilation never opens /dev/fuse (it is a runtime-only
      # requirement of fuse-overlayfs), so the build step sets
      # SKIP_FUSE_CHECK=true for container cells instead of creating the node.
      - uses: actions/checkout@v5

      - name: Resolve build track
        id: track
        run: |
          TRACK="${{ inputs.build_track || 'nightly' }}"
          echo "track=${TRACK}" >> "$GITHUB_OUTPUT"
          echo "Build track: ${TRACK}"

      - name: Cache Go modules and build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-mod
            ~/.cache/go-build
          # CICD-07: distro + explicit matrix.arch in the key isolate caches per
          # distro AND arch (matrix.arch is authoritative regardless of how the
          # runner reports runner.arch), preventing cross-distro contamination.
          key: go-${{ matrix.distro }}-${{ matrix.arch }}-${{ steps.track.outputs.track }}-${{ github.run_number }}
          restore-keys: |
            go-${{ matrix.distro }}-${{ matrix.arch }}-${{ steps.track.outputs.track }}-
            go-${{ matrix.distro }}-${{ matrix.arch }}-

      - name: Update apt cache
        run: sudo apt-get update

      - name: Build all components
        run: |
          # Dotted DISTRO override (T-21-03): closed case map from the matrix
          # label to the dotted VERSION_ID detect_distro_version_id validates
          # against ^[0-9]+\.[0-9]+$. Anything outside the allowlist hard-fails.
          case "${{ matrix.distro }}" in
            2404) DISTRO_DOTTED=24.04 ;;
            2604) DISTRO_DOTTED=26.04 ;;
            *) echo "ERROR: unknown matrix.distro '${{ matrix.distro }}'" >&2; exit 1 ;;
          esac
          DESTDIR="${{ runner.temp }}/podman-staging"
          mkdir -p "$DESTDIR"
          # Ensure Go cache dirs exist and are writable by root
          mkdir -p "$HOME/.cache/go-build" "$HOME/.cache/go-mod"
          # Build env args for sudo env (bypasses env_reset completely)
          # Point Go caches to runner-accessible paths for actions/cache compatibility
          ENV_ARGS="DEBIAN_FRONTEND=noninteractive DESTDIR=$DESTDIR"
          ENV_ARGS="$ENV_ARGS GOCACHE=$HOME/.cache/go-build GOMODCACHE=$HOME/.cache/go-mod"
          # Thread the dotted DISTRO override into setup.sh so config.sh composes
          # VERSION_SUFFIX=~ubuntu${DISTRO_DOTTED}.podman1 for this cell.
          ENV_ARGS="$ENV_ARGS DISTRO=$DISTRO_DOTTED"
          # Container cells: /dev/fuse is unusable inside the job container (the
          # device cgroup denies r/w on 10:229 even for root — see the NOTE above
          # the checkout step). The fuse gate is advisory at build time (nothing
          # opens /dev/fuse during compilation), so downgrade VAL-03 to a warning.
          if [[ -n "${{ matrix.container }}" ]]; then
            ENV_ARGS="$ENV_ARGS SKIP_FUSE_CHECK=true"
          fi
          if [[ "${{ steps.track.outputs.track }}" == "stable" ]]; then
            while IFS= read -r line; do
              [[ "$line" =~ ^[[:space:]]*# || -z "$line" ]] && continue
              line="${line#export }"
              key="${line%%=*}"
              val="${line#*=}"
              val="${val%\"}"
              val="${val#\"}"
              ENV_ARGS="$ENV_ARGS ${key}=${val}"
            done < versions-stable.env
          elif [[ "${{ steps.track.outputs.track }}" == "edge" ]]; then
            # Edge builds components from latest tags but needs pinned build tools
            eval "$(grep -E '^export (PROTOC_VERSION|PROTOC_TAG)=' versions-stable.env)"
            ENV_ARGS="$ENV_ARGS PROTOC_VERSION=$PROTOC_VERSION PROTOC_TAG=$PROTOC_TAG"
          elif [[ "${{ steps.track.outputs.track }}" == "nightly" ]]; then
            ENV_ARGS="$ENV_ARGS NIGHTLY_BUILD=true SHALLOW_CLONE=false"
          fi
          sudo env $ENV_ARGS ./setup.sh
          # Fix ownership so actions/cache can save the Go caches
          sudo chown -R "$(id -u):$(id -g)" "$HOME/.cache/go-build" "$HOME/.cache/go-mod"
        timeout-minutes: 150

      - name: Debug DESTDIR contents
        if: always()
        run: |
          DESTDIR="${{ runner.temp }}/podman-staging"
          echo "=== DESTDIR tree (directories) ==="
          find "$DESTDIR" -type d 2>/dev/null | head -50 || echo "DESTDIR not found or empty"
          echo ""
          echo "=== DESTDIR files (binaries) ==="
          find "$DESTDIR" -type f -name '*.so*' -o -type f -perm /111 2>/dev/null | head -50 || echo "No binaries found"
          echo ""
          echo "=== DESTDIR usr/bin/ ==="
          ls -la "$DESTDIR/usr/bin/" 2>/dev/null || echo "usr/bin/ does not exist"
          echo ""
          echo "=== DESTDIR total file count ==="
          # `|| echo 0` — under bash -o pipefail a missing DESTDIR would fail
          # the pipeline, and this step runs if: always() (i.e. after failures
          # when DESTDIR may not exist).
          find "$DESTDIR" -type f 2>/dev/null | wc -l || echo 0

      - name: Install nFPM
        run: |
          # Use Go installed by setup.sh
          export PATH="/opt/go/$(ls /opt/go/)/bin:$HOME/go/bin:$PATH"
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.45.0

      - name: Package all components
        run: |
          # Same dotted DISTRO override so package_all.sh's config.sh source
          # composes the correct per-distro VERSION_SUFFIX and the .deb filenames
          # carry ~ubuntu${DISTRO_DOTTED}.podman1 for this cell.
          case "${{ matrix.distro }}" in
            2404) DISTRO_DOTTED=24.04 ;;
            2604) DISTRO_DOTTED=26.04 ;;
            *) echo "ERROR: unknown matrix.distro '${{ matrix.distro }}'" >&2; exit 1 ;;
          esac
          export DISTRO="$DISTRO_DOTTED"
          export PATH="/opt/go/$(ls /opt/go/)/bin:$HOME/go/bin:$PATH"
          export DESTDIR="${{ runner.temp }}/podman-staging"
          if [[ "${{ steps.track.outputs.track }}" == "nightly" ]]; then
            export NIGHTLY_BUILD=true
          fi
          ./scripts/package_all.sh

      - uses: actions/upload-artifact@v6
        with:
          # CICD-07: distro + arch in the artifact name — the four names are
          # debs-2404-amd64, debs-2404-arm64, debs-2604-amd64, debs-2604-arm64.
          name: debs-${{ matrix.distro }}-${{ matrix.arch }}
          path: output/*.deb
          # The publish job consumes these within the same run; retention only
          # serves post-hoc debugging. Kept short so daily nightly x 4 cells
          # don't accumulate ~30 days of .deb artifacts in Actions storage.
          retention-days: 7

  # ============================================
  # Publish APT repository to GitHub Pages
  # ============================================
  # CICD-08 (atomic publish): this job is gated on the matrixed `build` job's
  #   AGGREGATE result. Because `build` is a single matrix job with
  #   `fail-fast: false`, `needs.build.result` is 'success' ONLY when EVERY one
  #   of the four cells (24.04/26.04 × amd64/arm64) succeeded; if any single
  #   cell fails (e.g. a 26.04 build break) the aggregate result is 'failure'
  #   and this publish job is skipped entirely — the live GitHub Pages repo is
  #   left untouched. There is no partial publish. (T-21-06)
  publish:
    needs: [build]
    # Publish runs when at least the 2404 cells succeeded. A 2604 build failure
    # leaves the publish running with only 2404 artifacts (publish_distro already
    # skips distros whose deb dir is empty). 'failure' covers partial cell failure
    # (fail-fast: false); 'cancelled'/'skipped' means no build ran at all.
    if: always() && (needs.build.result == 'success' || needs.build.result == 'failure')
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Run doc and HTML unit tests
        run: |
          bash tests/test_docs_suites.sh
          bash tests/test_index_html_distro.sh

      - name: Resolve build track
        id: track
        run: |
          TRACK="${{ inputs.build_track || 'nightly' }}"
          echo "track=${TRACK}" >> "$GITHUB_OUTPUT"
          echo "Build track: ${TRACK}"
          # NOTE: distro is no longer a single step output here. Both distros
          # (2404 and 2604) are downloaded and published in sequence below, each
          # with its own compact label fed to ci_publish.sh.

      # CICD-07 / T-21-05 (no cross-distro merge): each distro is downloaded into
      # its OWN directory. `merge-multiple: true` here is scoped to a single
      # distro's two arch artifacts only (e.g. debs-2404-amd64 + debs-2404-arm64
      # -> all-debs-2404/). No step ever merges debs-2404-* and debs-2604-* into
      # the same path, so 26.04 binaries can never land in a 24.04 publish or
      # vice versa.
      - name: Download 24.04 artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: debs-2404-*
          path: all-debs-2404/
          merge-multiple: true

      - name: Download 26.04 artifacts
        uses: actions/download-artifact@v7
        # 2604 build cells may have failed — continue so 2404 publish proceeds.
        continue-on-error: true
        with:
          pattern: debs-2604-*
          path: all-debs-2604/
          merge-multiple: true

      - name: Install reprepro
        run: |
          sudo apt-get update
          sudo apt-get install -y reprepro

      # Per-distro sequential publish into ONE accumulating repo-output: 2404
      # first, then 2604. ci_publish.sh's mirror-then-include model
      # (OTHER_SUITES = ALL_SUITES − PUBLISH_TARGETS) means the 2604 run mirrors
      # the 2404 run's freshly-published suites as OTHER_SUITES into the same
      # repo-output rather than clobbering them (T-21-08, Phase-20 verified). The
      # compact labels 2404/2604 are passed verbatim — config.sh validates them
      # against VALID_DISTROS=(2404 2604) (T-21-07).
      - name: Build and publish repository
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          REPO_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          TRACK="${{ steps.track.outputs.track }}"

          # publish_distro <compact-label> <deb-dir>: skip (with a logged
          # message) if the distro's download dir holds no .deb files. Gating
          # should prevent this, but ci_publish.sh hard-fails on an empty deb
          # dir; skipping keeps an unexpected-but-non-fatal empty cell from
          # aborting the publish of the populated distro.
          publish_distro() {
            local label="$1"
            local deb_dir="$2"
            local count
            count=$(find "${deb_dir}" -maxdepth 1 -name '*.deb' -type f 2>/dev/null | wc -l)
            if [[ "${count}" -eq 0 ]]; then
              echo "WARNING: no .deb files in ${deb_dir} — skipping ci_publish.sh for ${label}"
              return 0
            fi
            echo ">>> Publishing ${label} (${count} debs from ${deb_dir})"
            ./scripts/ci_publish.sh "${TRACK}" "${label}" "${deb_dir}" "${REPO_URL}" "repo-output"
          }

          # 2404 first, then 2604 — explicit ordering into one repo-output.
          publish_distro "2404" "all-debs-2404"
          publish_distro "2604" "all-debs-2604"

      # MIGR-04 installability smoke gate. Runs AFTER both ci_publish.sh runs
      # (repo-output is fully assembled + signed) and BEFORE the Pages upload, so
      # an uninstallable package never reaches the live repo (D-13/D-16). Each
      # leg installs the podman-suite meta-package from the assembled file://
      # repo inside a real ubuntu container and runs `podman info` (D-15). The
      # helper exits 1 on failure; `set -euo pipefail` aborts the step (and thus
      # skips configure-pages/upload-pages-artifact/deploy-pages) on a fail. No
      # `if:` guard — the gate runs on EVERY publish (stable/edge/nightly) so
      # regressions are caught on every push (D-18). amd64-only (D-17).
      - name: Smoke test — install podman-suite from assembled repo per distro
        run: |
          set -euo pipefail
          TRACK="${{ steps.track.outputs.track }}"
          export TRACK
          echo ">>> Running smoke gate for track ${TRACK}"
          ./scripts/smoke_repo_install.sh 2404 "$PWD/repo-output"
          # Only run 2604 smoke if a 2604 suite was actually published (2604 build
          # cells may have been skipped/failed and their debs omitted).
          if compgen -G "$PWD/repo-output/dists/${TRACK}-2604" > /dev/null 2>&1 || \
             [[ -d "$PWD/repo-output/dists/${TRACK}-2604" ]]; then
            ./scripts/smoke_repo_install.sh 2604 "$PWD/repo-output"
          else
            echo ">>> Skipping 2604 smoke — ${TRACK}-2604 suite not in repo-output (2604 build may have failed)"
          fi

      - uses: actions/configure-pages@v6

      # Atomic deploy (CICD-08): both distros are assembled into repo-output
      # before this single one-shot Pages deploy. The live repository is
      # replaced in one step or not at all.
      - uses: actions/upload-pages-artifact@v5
        with:
          path: repo-output/

      - id: deployment
        uses: actions/deploy-pages@v5
