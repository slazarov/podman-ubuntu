name: Build and Publish Packages

on:
  workflow_dispatch:
    inputs:
      build_track:
        description: 'Build track (stable = pinned versions, edge = latest upstream)'
        required: true
        type: choice
        options:
          - stable
          - edge
        default: stable

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ============================================
  # Build on native amd64 runner
  # ============================================
  build-amd64:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Set version tags (stable)
        if: inputs.build_track == 'stable'
        run: |
          # Source pinned versions into GITHUB_ENV for all subsequent steps
          while IFS= read -r line; do
            # Skip comments and empty lines
            [[ "$line" =~ ^#.*$ || -z "$line" ]] && continue
            # Strip 'export ' prefix and surrounding quotes from values
            line="${line#export }"
            key="${line%%=*}"
            val="${line#*=}"
            val="${val%\"}"
            val="${val#\"}"
            echo "${key}=${val}" >> "$GITHUB_ENV"
          done < versions-stable.env

      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-mod
            ~/.cache/go-build
          key: go-${{ runner.arch }}-${{ hashFiles('versions-stable.env') }}
          restore-keys: |
            go-${{ runner.arch }}-

      - name: Update apt cache
        run: sudo apt-get update

      - name: Build all components
        run: |
          DESTDIR="${{ runner.temp }}/podman-staging"
          mkdir -p "$DESTDIR"
          # Ensure Go cache dirs exist and are writable by root
          mkdir -p "$HOME/.cache/go-build" "$HOME/.cache/go-mod"
          # Build env args for sudo env (bypasses env_reset completely)
          # Point Go caches to runner-accessible paths for actions/cache compatibility
          ENV_ARGS="DEBIAN_FRONTEND=noninteractive DESTDIR=$DESTDIR"
          ENV_ARGS="$ENV_ARGS GOCACHE=$HOME/.cache/go-build GOMODCACHE=$HOME/.cache/go-mod"
          if [[ "${{ inputs.build_track }}" == "stable" ]]; then
            while IFS= read -r line; do
              [[ "$line" =~ ^[[:space:]]*# || -z "$line" ]] && continue
              line="${line#export }"
              key="${line%%=*}"
              val="${line#*=}"
              val="${val%\"}"
              val="${val#\"}"
              ENV_ARGS="$ENV_ARGS ${key}=${val}"
            done < versions-stable.env
          fi
          sudo env $ENV_ARGS ./setup.sh
          # Fix ownership so actions/cache can save the Go caches
          sudo chown -R "$(id -u):$(id -g)" "$HOME/.cache/go-build" "$HOME/.cache/go-mod"
        timeout-minutes: 150

      - name: Debug DESTDIR contents
        if: always()
        run: |
          DESTDIR="${{ runner.temp }}/podman-staging"
          echo "=== DESTDIR tree (directories) ==="
          find "$DESTDIR" -type d 2>/dev/null | head -50 || echo "DESTDIR not found or empty"
          echo ""
          echo "=== DESTDIR files (binaries) ==="
          find "$DESTDIR" -type f -name '*.so*' -o -type f -perm /111 2>/dev/null | head -50 || echo "No binaries found"
          echo ""
          echo "=== DESTDIR usr/bin/ ==="
          ls -la "$DESTDIR/usr/bin/" 2>/dev/null || echo "usr/bin/ does not exist"
          echo ""
          echo "=== DESTDIR total file count ==="
          find "$DESTDIR" -type f 2>/dev/null | wc -l

      - name: Install nFPM
        run: |
          # Use Go installed by setup.sh
          export PATH="/opt/go/$(ls /opt/go/)/bin:$HOME/go/bin:$PATH"
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.45.0

      - name: Package all components
        run: |
          export PATH="/opt/go/$(ls /opt/go/)/bin:$HOME/go/bin:$PATH"
          export DESTDIR="${{ runner.temp }}/podman-staging"
          ./scripts/package_all.sh

      - uses: actions/upload-artifact@v4
        with:
          name: debs-amd64
          path: output/*.deb
          retention-days: 30

  # ============================================
  # Build on native arm64 runner
  # ============================================
  build-arm64:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Set version tags (stable)
        if: inputs.build_track == 'stable'
        run: |
          while IFS= read -r line; do
            [[ "$line" =~ ^#.*$ || -z "$line" ]] && continue
            line="${line#export }"
            key="${line%%=*}"
            val="${line#*=}"
            val="${val%\"}"
            val="${val#\"}"
            echo "${key}=${val}" >> "$GITHUB_ENV"
          done < versions-stable.env

      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-mod
            ~/.cache/go-build
          key: go-${{ runner.arch }}-${{ hashFiles('versions-stable.env') }}
          restore-keys: |
            go-${{ runner.arch }}-

      - name: Update apt cache
        run: sudo apt-get update

      - name: Build all components
        run: |
          DESTDIR="${{ runner.temp }}/podman-staging"
          mkdir -p "$DESTDIR"
          mkdir -p "$HOME/.cache/go-build" "$HOME/.cache/go-mod"
          ENV_ARGS="DEBIAN_FRONTEND=noninteractive DESTDIR=$DESTDIR"
          ENV_ARGS="$ENV_ARGS GOCACHE=$HOME/.cache/go-build GOMODCACHE=$HOME/.cache/go-mod"
          if [[ "${{ inputs.build_track }}" == "stable" ]]; then
            while IFS= read -r line; do
              [[ "$line" =~ ^[[:space:]]*# || -z "$line" ]] && continue
              line="${line#export }"
              key="${line%%=*}"
              val="${line#*=}"
              val="${val%\"}"
              val="${val#\"}"
              ENV_ARGS="$ENV_ARGS ${key}=${val}"
            done < versions-stable.env
          fi
          sudo env $ENV_ARGS ./setup.sh
          sudo chown -R "$(id -u):$(id -g)" "$HOME/.cache/go-build" "$HOME/.cache/go-mod"
        timeout-minutes: 150

      - name: Install nFPM
        run: |
          export PATH="/opt/go/$(ls /opt/go/)/bin:$HOME/go/bin:$PATH"
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.45.0

      - name: Package all components
        run: |
          export PATH="/opt/go/$(ls /opt/go/)/bin:$HOME/go/bin:$PATH"
          export DESTDIR="${{ runner.temp }}/podman-staging"
          ./scripts/package_all.sh

      - uses: actions/upload-artifact@v4
        with:
          name: debs-arm64
          path: output/*.deb
          retention-days: 30

  # ============================================
  # Publish APT repository to GitHub Pages
  # ============================================
  publish:
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: debs-*
          path: all-debs/
          merge-multiple: true

      - name: Install reprepro
        run: |
          sudo apt-get update
          sudo apt-get install -y reprepro

      - name: Build and publish repository
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          ./scripts/ci_publish.sh \
            "${{ inputs.build_track }}" \
            "all-debs" \
            "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}" \
            "repo-output"

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: repo-output/

      - id: deployment
        uses: actions/deploy-pages@v4
