version: 2
updates:
  # Keep GitHub Actions fresh. Workflows pin actions to commit SHAs with a
  # `# vX` comment; Dependabot bumps both the SHA and the comment together.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns: ["*"]
