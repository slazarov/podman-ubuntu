# Podman containers configuration
# This file configures podman to find helper binaries in /usr/local/bin
# which is where podman-debian installs netavark, aardvark-dns, etc.

[engine]
helper_binaries_dir = [
    "/usr/local/bin",
    "/usr/local/libexec/podman",
    "/usr/libexec/podman",
    "/usr/local/lib/podman",
    "/usr/lib/podman"
]
